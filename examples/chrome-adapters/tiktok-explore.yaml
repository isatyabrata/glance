# Adapter logic derived from OpenCLI (https://github.com/jackwener/opencli)
# Original author: jackwener | License: Apache-2.0
site: tiktok
name: explore
description: Get trending TikTok videos from explore page
domain: www.tiktok.com

args:
  limit:
    type: int
    default: 20
    description: Number of videos

pipeline:
  - navigate:
      url: https://www.tiktok.com/explore
      settleMs: 5000

  - evaluate: |
      (() => {
        const limit = ${{ args.limit }};
        const links = Array.from(document.querySelectorAll('a[href*="/video/"]'));
        const seen = new Set();
        const results = [];
        for (const a of links) {
          const href = a.href;
          if (seen.has(href)) continue;
          seen.add(href);
          const match = href.match(/@([^/]+)\/video\/(\d+)/);
          results.push({
            rank: results.length + 1,
            author: match ? match[1] : '',
            views: a.textContent.trim() || '-',
            url: href,
          });
          if (results.length >= limit) break;
        }
        return results;
      })()

columns: [rank, author, views, url]
