# Adapter logic derived from OpenCLI (https://github.com/jackwener/opencli)
# Original author: jackwener | License: Apache-2.0
site: chaoxing
name: assignments
description: "学习通作业列表"
domain: mooc2-ans.chaoxing.com
strategy: cookie
browser: true
timeoutSeconds: 90

args:
  course:
    type: string
    description: "按课程名过滤（模糊匹配）"
  status:
    type: string
    default: all
    choices: [all, pending, submitted, graded]
    description: "按状态过滤"
  limit:
    type: int
    default: 20
    description: "最大返回数量"

columns: [rank, course, title, deadline, status, score]

pipeline:
  - navigate: https://mooc2-ans.chaoxing.com/mooc2-ans/visit/interaction
  - wait: 2
  - evaluate: |
      (async () => {
        return [{ rank: 1, course: 'info', title: 'Chaoxing assignments requires multi-course iframe navigation chain.', deadline: '', status: 'Use the TypeScript adapter for full functionality.', score: '' }];
      })()
